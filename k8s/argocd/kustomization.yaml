apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd
resources:
  - argocd-namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
    # TODO: Switch from the install manifest -> stable resources?
    # TODO: Add patch to argocd service || add an istio based ingress
    # TODO: How to automate installation of CRDs? use server side apply
    # TODO: Add the root app as a deployed resource?
    # TODO: Patch cm to enable-helm
  - argocd-cert.yaml
  - argocd-gateway.yaml
  - argocd-httproutes.yaml

patches:
  - path: argocd-cmd-params-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
  - path: argocd-server-service.yaml
    target:
      kind: Service
      name: argocd-server
  # - path: argocd-deployment.yaml
  #   target:
  #     kind: Deployment
  #     name: argocd-server

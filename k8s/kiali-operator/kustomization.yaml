---
# https://kiali.io/docs/installation/quick-start/#install-via-helm
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kiali-operator

helmCharts:
  # https://kiali.io/docs/installation/installation-guide/install-with-helm/#install-with-operator
  - name: kiali-operator
    repo: https://kiali.org/helm-charts
    version: 2.23.0
    releaseName: kiali-operator
    namespace: istio-system
    # generate with `helm show values kiali/kiali-operator >> values.yaml`
    valuesFile: values.yaml

# Add in later if extra customizatin is needed to the kiali deployment
# resources:
#   - kiali-cr.yaml

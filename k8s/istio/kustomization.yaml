# helm install istio-cni istio/cni -n istio-system --set profile=ambient --set global.platform=k3s --wait
# https://istio.io/latest/docs/ambient/install/helm/
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: istio-system

labels:
  - includeSelectors: false
    pairs:
      owner: bramble
      environment: minibramble

resources:
  - istio-namespace.yaml
  - peer-authentication.yaml
  - authorization-policies.yaml
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.0/standard-install.yaml

helmCharts:
  - name: base
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.1
    releaseName: istio-base
    includeCRDs: true
    namespace: istio-system

  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.1
    releaseName: istiod
    namespace: istio-system
    valuesInline:
      profile: ambient
      meshConfig:
        accessLogFile: /dev/stdout
      pilot:
        env:
          # Required for Ambient mode visibility
          TERMINATION_DRAIN_DURATION_SECONDS: "20"

  - name: cni
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.1
    releaseName: istio-cni
    namespace: istio-system
    valuesInline:
      profile: ambient
      global:
        platform: k3s

  - name: ztunnel
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.1
    releaseName: ztunnel
    namespace: istio-system

  # https://kiali.io/docs/installation/installation-guide/install-with-helm/#standalone-kiali-installation
  - name: kiali-server
    repo: https://kiali.org/helm-charts
    version: 2.23.0
    includeCRDs: true
    releaseName: kiali-server
    namespace: istio-system
    # generate with `helm show values kiali/kiali-server >> values.yaml`
    # valuesFile: values.yaml

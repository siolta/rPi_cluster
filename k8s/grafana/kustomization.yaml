apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

helmCharts:
  - name: grafana
    repo: https://grafana.github.io/helm-charts
    releaseName: grafana
    namespace: monitoring
    skipHooks: true
    valuesFile: values.yaml

resources:
  - dashboards/ # Folder containing your JSON-to-ConfigMap manifests
  # - gateway.yaml
  # - httproute.yaml

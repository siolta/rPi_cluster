---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
labels:
  - includeSelectors: false
    pairs:
      grafana_dashboard: "bramble"

resources:
  - pi-stats.yaml

configMapGenerator:
  # source: https://grafana.com/grafana/dashboards/15661-k8s-dashboard-en-20250125/
  - name: kubernetes-dashboard
    namespace: monitoring
    files:
      - k8s-dashboard.json
  # source: https://grafana.com/grafana/dashboards/7645-istio-control-plane-dashboard/
  - name: istio-dashboard
    namespace: monitoring
    files:
      - istio-dashboard.json
  # source: https://grafana.com/grafana/dashboards/14584-argocd/
  - name: argocd-dashboard
    namespace: monitoring
    files:
      - argocd-dashboard.json
  # source: https://grafana.com/grafana/dashboards/1860-node-exporter-full/
  # TODO: Annotations metadata is too long to be applied by argocd?
  # - name: node-exporter-dashboard
  #   namespace: monitoring
  #   files:
  #     - node-exporter-dashboard.json

generatorOptions:
  disableNameSuffixHash: true

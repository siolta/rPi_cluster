---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
labels:
  - includeSelectors: false
    pairs:
      grafana_dashboard: "bramble"

resources:
  # source: https://grafana.com/grafana/dashboards/15661-k8s-dashboard-en-20250125/
  # - k8s-dashboard.yaml
  # source: https://grafana.com/grafana/dashboards/7645-istio-control-plane-dashboard/
  - istio-dashboard.yaml
  - pi-stats.yaml
  # source: https://grafana.com/grafana/dashboards/14584-argocd/
  - argocd-dashboard.yaml

# Can also generate those cms using kustomize
#
configMapGenerator:
  - name: kubernetes-dashboard
    namespace: monitoring
    # specify name of locally downloaded json
    files:
      - k8s-dashboard.json

generatorOptions:
  disableNameSuffixHash: true

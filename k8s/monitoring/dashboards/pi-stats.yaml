apiVersion: v1
kind: ConfigMap
metadata:
  name: pi-cluster-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "bramble"
data:
  pi-stats.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Cluster CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            { "expr": "100 - (avg by (instance) (irate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)", "legendFormat": "{{instance}}" }
          ]
        },
        {
          "title": "Cluster Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            { "expr": "((node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes) * 100", "legendFormat": "{{instance}}" }
          ]
        },
        {
          "title": "Pi Node Temperatures",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 60 },
                  { "color": "red", "value": 80 }
                ]
              }
            }
          },
          "targets": [
            { "expr": "node_hwmon_temp_celsius", "legendFormat": "{{instance}}" }
          ]
        }
      ],
      "refresh": "5s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["raspberry-pi", "k3s"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Pi 5 Cluster Stats",
      "uid": "pi-5-stats-001"
    }

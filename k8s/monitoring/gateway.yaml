apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: grafana-gateway
  namespace: monitoring # Or your preferred gateway namespace
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "grafana.bramble"
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "grafana.bramble"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: grafana-bramble-cert
      allowedRoutes:
        namespaces:
          from: Same

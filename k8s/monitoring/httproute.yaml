---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
    - name: grafana-gateway
      namespace: monitoring
      sectionName: http
    - name: grafana-gateway
      namespace: monitoring
      sectionName: https
  hostnames:
    - "grafana.bramble"
  rules:
    - backendRefs:
        - name: grafana
          port: 80
